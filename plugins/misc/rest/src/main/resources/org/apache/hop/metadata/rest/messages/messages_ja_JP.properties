RestConnectionEditor.Tab.Connection.Title=Connection
RestConnectionEditor.Tab.Pagination.Title=Pagination
RestConnectionEditor.Pagination.Info=Choose how paging tokens propagate for REST transforms that enable pagination. OFFSET_LIMIT and PAGE_NUMBER use the query-parameter names below. LINK_HEADER follows RFC 5988 rel="next". CURSOR extracts tokens using JsonPath (JSON) or XPath (XML).
RestConnectionEditor.Pagination.Type.Label=Pagination strategy
RestConnectionEditor.Pagination.PageParam.Label=Page / cursor query parameter name
RestConnectionEditor.Pagination.PageParam.Tooltip=Query parameter for PAGE_NUMBER or CURSOR (e.g. page, cursor). Ignored by OFFSET_LIMIT.
RestConnectionEditor.Pagination.OffsetParam.Label=Offset query parameter name (OFFSET_LIMIT)
RestConnectionEditor.Pagination.LimitParam.Label=Limit query parameter name (OFFSET_LIMIT)
RestConnectionEditor.Pagination.DefaultLimit.Label=Default batch size (0 = Hop default fallback)
RestConnectionEditor.Pagination.DefaultLimit.Tooltip=Page size communicated with OFFSET_LIMIT paging.
RestConnectionEditor.Pagination.CursorJson.Label=Cursor JsonPath (CURSOR + JSON)
RestConnectionEditor.Pagination.CursorXPath.Label=Cursor XPath (CURSOR + XML)
