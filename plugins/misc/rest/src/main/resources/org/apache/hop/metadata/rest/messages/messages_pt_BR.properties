RestConnectionEditor.Tab.Pagination.Title=Paginação
RestConnectionEditor.Pagination.Info=Escolha como os sinais de paginação se propagam para transformar REST que permitem a paginação. OFFSET LIMIT e PAGE NUMBER usam parâmetros de consulta. LINK HEADER segue RFC 5988 rel=\"próximo\". CURSOR usa parâmetros de consulta. BODY CURSOR funde cursor e tamanho de lote no corpo de solicitação (GET volta para consulta). HEADER CURSOR envia o cursor como um cabeçalho de pedido. O URL do corpo de resposta segue o URL da próxima página. Modos de cursor param quando o próximo cursor está vazio.
RestConnectionEditor.Pagination.Type.Label=Estratégia de paginação
RestConnectionEditor.Pagination.PageParam.Label=Página / cursor nome do parâmetro
RestConnectionEditor.Pagination.PageParam.Tooltip=Parâmetro de consulta para PAGE NUMBER ou CURSOR (por exemplo, página, cursor). Nome do campo de corpo para CORPO (por exemplo, cursor). Pedido de nome de cabeçalho para HEADER CURSOR. Ignorado por OFFSET, LINK HEADER, e BODY NEXT URL.
RestConnectionEditor.Pagination.OffsetParam.Label=Nome do parâmetro de consulta de deslocamento (OFFSET LIMIT)
RestConnectionEditor.Pagination.LimitParam.Label=Limite / tamanho do lote nome do parâmetro
RestConnectionEditor.Pagination.DefaultLimit.Label=Tamanho padrão do lote (0 = Regresso padrão do salto)
RestConnectionEditor.Pagination.DefaultLimit.Tooltip=Tamanho da página para OFFSET LIMIT (query) ou CORPO CURSO (corpo pedido). Quando 0 , Hop cai para 100 para CORPO.
RestConnectionEditor.Pagination.CursorJson.Label=Cursor JsonPath
RestConnectionEditor.Pagination.CursorXPath.Label=Cursor XPath
