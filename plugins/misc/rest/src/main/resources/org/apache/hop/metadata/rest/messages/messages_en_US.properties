RestConnectionEditor.Tab.Pagination.Title=Pagination
RestConnectionEditor.Pagination.Info=Choose how paging tokens propagate for REST transforms that enable pagination. OFFSET_LIMIT and PAGE_NUMBER use query parameters. LINK_HEADER follows RFC 5988 rel=\"next\". CURSOR uses query parameters. BODY_CURSOR merges cursor and batch-size into the request body (GET falls back to query). HEADER_CURSOR sends the cursor as a request header. BODY_NEXT_URL follows a next-page URL from the response body. Cursor-style modes stop when the next cursor is empty.
RestConnectionEditor.Pagination.Type.Label=Pagination strategy
RestConnectionEditor.Pagination.PageParam.Label=Page / cursor parameter name
RestConnectionEditor.Pagination.PageParam.Tooltip=Query parameter for PAGE_NUMBER or CURSOR (e.g. page, cursor). Body field name for BODY_CURSOR (e.g. cursor). Request header name for HEADER_CURSOR. Ignored by OFFSET_LIMIT, LINK_HEADER, and BODY_NEXT_URL.
RestConnectionEditor.Pagination.OffsetParam.Label=Offset query parameter name (OFFSET_LIMIT)
RestConnectionEditor.Pagination.LimitParam.Label=Limit / batch-size parameter name
RestConnectionEditor.Pagination.DefaultLimit.Label=Default batch size (0 = Hop default fallback)
RestConnectionEditor.Pagination.DefaultLimit.Tooltip=Page size for OFFSET_LIMIT (query) or BODY_CURSOR (request body). When 0, Hop falls back to 100 for BODY_CURSOR.
RestConnectionEditor.Pagination.CursorJson.Label=Cursor JsonPath (CURSOR / BODY_CURSOR / HEADER_CURSOR + JSON)
RestConnectionEditor.Pagination.CursorXPath.Label=Cursor XPath (CURSOR / BODY_CURSOR / HEADER_CURSOR + XML)
RestConnectionEditor.Pagination.NextUrlJson.Label=Next page URL JsonPath (BODY_NEXT_URL + JSON)
RestConnectionEditor.Pagination.NextUrlXPath.Label=Next page URL XPath (BODY_NEXT_URL + XML)