# Source of truth for marketplace-optional plugins (not bundled in hop-client).
# full-client-env.yaml is generated from this list; GUI catalog loads it at runtime.
# When moving a plugin out of the fat assembly, add an entry here only.

schemaVersion: "1"
groupId: org.apache.hop
plugins:
  #
  # Engines
  #
  - artifactId: hop-engines-spark
    name: Native Spark engine
    category: Engines
    description: Run pipelines on Apache Spark (local or cluster).
    installPath: plugins/engines/spark
    modulePath: plugins/engines/spark
  - artifactId: hop-engines-beam
    name: Apache Beam engine
    category: Engines
    description: Beam pipeline engine and transforms; SDKs under plugins/engines/beam/lib-beam.
    installPath: plugins/engines/beam
    modulePath: plugins/engines/beam
  #
  # Transforms
  #
  - artifactId: hop-transform-script
    name: Script
    category: Transforms
    description: Scripting transform with embedded language runtimes.
    installPath: plugins/transforms/script
    modulePath: plugins/transforms/script
  - artifactId: hop-transform-tika
    name: Apache Tika
    category: Transforms
    description: Extract text and metadata from documents via Apache Tika.
    installPath: plugins/transforms/tika
    modulePath: plugins/transforms/tika
  - artifactId: hop-transform-drools
    name: Drools
    category: Transforms
    description: Business rules with Drools.
    installPath: plugins/transforms/drools
    modulePath: plugins/transforms/drools
  - artifactId: hop-transform-stanfordnlp
    name: Stanford NLP
    category: Transforms
    description: Natural language processing with Stanford NLP.
    installPath: plugins/transforms/stanfordnlp
    modulePath: plugins/transforms/stanfordnlp
  - artifactId: hop-transform-vcard
    name: vCard
    category: Transforms
    description: vCard input/output
    installPath: plugins/transforms/vcard
    modulePath: plugins/transforms/vcard
  - artifactId: hop-transform-fake
    name: Fake
    category: Transforms
    description: Generate fake data
    installPath: plugins/transforms/fake
    modulePath: plugins/transforms/fake
  #
  # Technology
  #
  - artifactId: hop-tech-cassandra
    name: Cassandra
    category: Technology
    description: Apache Cassandra input/output and related tech.
    installPath: plugins/tech/cassandra
    modulePath: plugins/tech/cassandra
  - artifactId: hop-tech-parquet
    name: Parquet
    category: Technology
    description: Parquet file format support.
    installPath: plugins/tech/parquet
    modulePath: plugins/tech/parquet
  - artifactId: hop-tech-arrow
    name: Apache Arrow
    category: Technology
    description: Apache Arrow integration.
    installPath: plugins/tech/arrow
    modulePath: plugins/tech/arrow
  - artifactId: hop-tech-dropbox
    name: Dropbox
    category: Technology
    description: Dropbox VFS and related support.
    installPath: plugins/tech/dropbox
    modulePath: plugins/tech/dropbox
  - artifactId: hop-transform-edi2xml
    name: EDI to XML
    category: Transforms
    description: Convert EDI messages to XML.
    installPath: plugins/transforms/edi2xml
    modulePath: plugins/transforms/edi2xml
  - artifactId: hop-tech-neo4j
    name: Neo4j
    category: Technology
    description: Neo4j Graph Database
    installPath: plugins/tech/neo4j
    modulePath: plugins/tech/neo4j
  - artifactId: hop-tech-azure
    name: Azure
    category: Technology
    description: Microsoft Azure Cloud platform
    installPath: plugins/tech/azure
    modulePath: plugins/tech/azure
  - artifactId: hop-tech-aws
    name: AWS
    category: Technology
    description: Amazon Web Services (AWS)
    installPath: plugins/tech/aws
    modulePath: plugins/tech/aws
  - artifactId: hop-tech-mongodb
    name: MongoDB
    category: Technology
    description: MongoDB
    installPath: plugins/tech/mongodb
    modulePath: plugins/tech/mongodb
  - artifactId: hop-tech-elastic
    name: Elastic
    category: Technology
    description: Elastic
    installPath: plugins/tech/elastic
    modulePath: plugins/tech/elastic
  - artifactId: hop-tech-opensearch
    name: OpenSearch
    category: Technology
    description: OpenSearch
    installPath: plugins/tech/opensearch
    modulePath: plugins/tech/opensearch
  - artifactId: hop-tech-salesforce
    name: SaleForce
    category: Technology
    description: SalesForce (SFDC)
    installPath: plugins/tech/salesforce
    modulePath: plugins/tech/salesforce
  - artifactId: hop-tech-avro
    name: Avro
    category: Technology
    description: Avro format
    installPath: plugins/tech/avro
    modulePath: plugins/tech/avro
  - artifactId: hop-tech-google
    name: Google
    category: Google
    description: Google technology
    installPath: plugins/tech/google
    modulePath: plugins/tech/google
  - artifactId: hop-tech-minio
    name: MinIO
    category: Technology
    description: MinIO
    installPath: plugins/tech/minio
    modulePath: plugins/tech/minio
  - artifactId: hop-tech-databricks
    name: Databricks
    category: Technology
    description: Databricks platform, VFS, Spark, jobs
    installPath: plugins/tech/databricks
    modulePath: plugins/tech/databricks
  #
  # Miscellaneous
  #
  - artifactId: hop-misc-py4j
    name: PyHop
    category: Miscellaneous
    description: Hop for Python (PyHop)
    installPath: plugins/misc/py4j
    modulePath: plugins/misc/py4j
  - artifactId: hop-misc-rest
    name: REST
    category: Miscellaneous
    description: REST support
    installPath: plugins/misc/rest
    modulePath: plugins/misc/rest
  - artifactId: hop-misc-documentation
    name: Documentation
    category: Miscellaneous
    description: Generate Hop documentation
    installPath: plugins/misc/documentation
    modulePath: plugins/misc/documentation
  - artifactId: hop-misc-import
    name: Import
    category: Miscellaneous
    description: Import Kettle / Pentaho Data Integration metadata
    installPath: plugins/misc/import
    modulePath: plugins/misc/import
  - artifactId: hop-misc-mail
    name: Mail
    category: Miscellaneous
    description: Send / Receive mail
    installPath: plugins/misc/mail
    modulePath: plugins/misc/mail
