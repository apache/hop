#
# Shareable marketplace repository definition.
#
#   ./hop marketplace repo import this-file.yaml
#   ./hop marketplace query datavault
#   ./hop marketplace install org.apache.hop:hop-datavault:0.4.0-SNAPSHOT
#
# browse: true → Hop lists *.zip from this Nexus repo live (no cache, no refresh).
# Optional plugins: metadata below only enriches display when present.
#
schemaVersion: "1.0"
kind: hop-marketplace-repository

id: data-hopper-community
name: Data Hopper Community Plugins
url: https://repository.data-hopper.com/repository/hop-community-plugins/
primary: false
enabled: true
browse: true
includeSnapshots: true

# Optional metadata (enriches live Nexus list; not a cache)
# minHopVersion: only show when the running Hop is >= this version
# version: optional pin of the plugin artifact (else latest from browse)
plugins:
  - groupId: org.apache.hop
    artifactId: hop-datavault
    version: 0.4.0-SNAPSHOT
    minHopVersion: "2.18.1"
    name: Data Vault
    category: Community
    description: Data Vault transforms for Hop
