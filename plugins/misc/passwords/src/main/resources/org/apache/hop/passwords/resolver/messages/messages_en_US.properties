HopPasswordVariableResolver.label.resolveAsVariable = Resolve argument as a variable name
HopPasswordVariableResolver.tooltip.resolveAsVariable = When enabled, the value after the colon is treated as a variable name. That variable is looked up and its value is decrypted. When disabled, the argument is decrypted as a literal (for example Encrypted \u2026 or AES2 \u2026). Prefer the variable-name form for cleaner expressions such as ''#{hop-pwd:SFTP_PASSWORD}''.
HopPasswordVariableResolver.label.failIfVariableNotDefined = Fail if variable is not defined
HopPasswordVariableResolver.tooltip.failIfVariableNotDefined = When enabled together with "Resolve argument as a variable name", an undefined variable name causes an error (pipeline/workflow fails). When disabled, a missing variable is ignored and the original expression is left unchanged.

