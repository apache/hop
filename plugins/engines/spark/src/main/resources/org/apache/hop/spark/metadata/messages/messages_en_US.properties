SparkCatalog.Name=Spark Catalog
SparkCatalog.Description=Spark SQL catalog for open table formats (Iceberg Hadoop/REST, custom)
SparkCatalog.Name.Label=Name
SparkCatalog.CatalogName.Label=Spark catalog name
SparkCatalog.CatalogName.Tooltip=Name used in spark.sql.catalog.<name> (e.g. lake). Must match the first part of table identifiers.
SparkCatalog.CatalogType.Label=Catalog type
SparkCatalog.CatalogType.Tooltip=hadoop (warehouse), rest (uri), custom (implementation), or advanced hive/glue via extra conf
SparkCatalog.Implementation.Label=Implementation class
SparkCatalog.Implementation.Tooltip=Full class name (default org.apache.iceberg.spark.SparkCatalog). Required for custom type.
SparkCatalog.Warehouse.Label=Warehouse
SparkCatalog.Warehouse.Tooltip=Warehouse path/URI (hadoop type; file:// or s3a://...)
SparkCatalog.Uri.Label=URI
SparkCatalog.Uri.Tooltip=REST catalog endpoint (or thrift URI for advanced hive)
SparkCatalog.Credential.Label=Credential / token
SparkCatalog.Credential.Tooltip=Optional secret (password field). Not logged. For REST catalogs this maps to spark.sql.catalog.<name>.token when set.
SparkCatalog.ConfExtra.Label=Extra conf (key=value lines)
SparkCatalog.ConfExtra.Tooltip=One key=value per line (# comments allowed). Short keys become spark.sql.catalog.<name>.key. Treat as sensitive if tokens are included.
SparkCatalog.LoadTemplate.Label=Load catalog template
SparkCatalog.LoadTemplate.ToolTip=Fill the form from a named catalog scenario (Iceberg Hadoop/REST, Hive, Glue, \u2026). Replace placeholders for your environment.
SparkCatalog.LoadTemplate.Dialog.Title=Load catalog template
SparkCatalog.LoadTemplate.Dialog.Message=Choose a catalog scenario. Placeholders (host, bucket, URI) must be adjusted for your environment.
SparkCatalog.LoadTemplate.Confirm.Title=Replace catalog settings?
SparkCatalog.LoadTemplate.Confirm.Message=Replace the current catalog fields with template "{0}"?
