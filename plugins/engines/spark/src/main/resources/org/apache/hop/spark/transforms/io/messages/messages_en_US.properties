SparkFileInput.Name=Spark File Input
SparkFileInput.Description=Read files with the native Spark engine (CSV, Parquet, JSON, ORC). Path is a Spark/Hadoop URI, not Hop VFS.
SparkFileInput.Keyword=spark,file,input,csv,parquet,json

SparkFileOutput.Name=Spark File Output
SparkFileOutput.Description=Write files with the native Spark engine (CSV, Parquet, JSON, ORC). Path is a Spark/Hadoop URI, not Hop VFS.
SparkFileOutput.Keyword=spark,file,output,csv,parquet,json

SparkFileInputDialog.Shell.Title=Spark File Input
SparkFileInputDialog.FilePath=Spark path (Hadoop URI)
SparkFileInputDialog.FilePath.Tooltip=URI visible to Spark on every executor (not Hop VFS). Examples\: file path on local[*], hdfs\://…, s3a\://bucket/prefix. Do not use Hop-only schemes such as s3\:// or named MinIO (minio\://). Avoid ${PROJECT_HOME} here when using a Spark project package — that variable points at definition files, not data; use HOP_DATA / OUTPUT_ROOT or s3a\:// for Dataset paths.
SparkFileInputDialog.Format=Format
SparkFileInputDialog.Header=First line is header
SparkFileInputDialog.Separator=Separator
SparkFileInputDialog.Quote=Quote character
SparkFileInputDialog.InferSchema=Infer schema (CSV without field list)
SparkFileInputDialog.ExtraOptions=Extra options (key=value lines)
SparkFileInputDialog.Fields=Fields (optional schema)
SparkFileInputDialog.Column.Name=Name
SparkFileInputDialog.Column.Type=Type
SparkFileInputDialog.Column.Length=Length
SparkFileInputDialog.Column.Precision=Precision

SparkFileOutputDialog.Shell.Title=Spark File Output
SparkFileOutputDialog.FilePath=Spark path / directory (Hadoop URI)
SparkFileOutputDialog.FilePath.Tooltip=Output directory or prefix Spark should write to (Hadoop FileSystem URI). Examples\: local path, hdfs\://…, s3a\://bucket/prefix. Not a Hop VFS path. Avoid ${PROJECT_HOME} with a Spark project package (definitions only); use HOP_DATA / OUTPUT_ROOT or s3a\:// for data.
SparkFileOutputDialog.Format=Format
SparkFileOutputDialog.SaveMode=Save mode
SparkFileOutputDialog.Header=Write header
SparkFileOutputDialog.Separator=Separator
SparkFileOutputDialog.Quote=Quote character
SparkFileOutputDialog.PartitionBy=Partition by columns (comma-separated)
SparkFileOutputDialog.Coalesce=Coalesce partitions (e.g. 1 for single file)
SparkFileOutputDialog.ExtraOptions=Extra options (key=value lines)
