SparkGuiPlugin.Menu.ExportSparkProjectPackage.Text=Export project package for Native Spark...
SparkGuiPlugin.ExportSparkProject.Dialog.Header=Export for Native Spark execution
SparkGuiPlugin.ExportSparkProject.Dialog.Message1=This builds a project package zip specifically for running pipelines on the Native Spark engine (MainSpark --HopProjectPackage).
SparkGuiPlugin.ExportSparkProject.Dialog.Message2=It includes project definition files (pipelines, workflows, small resources under project/) plus metadata.json. Bulk folders such as datasets/ are skipped by default. This is not the same as File → Export current project to zip.
SparkGuiPlugin.ExportSparkProject.Dialog.Message3=On the cluster the package is shipped to every executor (SparkFiles) so Simple Mapping and Pipeline Executor paths under ${PROJECT_HOME} resolve. Use separate variables (HOP_DATA / s3a://…) for Spark File data paths — not PROJECT_HOME.
SparkGuiPlugin.ExportSparkProject.NoProject.Header=No active project
SparkGuiPlugin.ExportSparkProject.NoProject.Message=PROJECT_HOME is not set. Open or enable a Hop project first, then export again.
SparkGuiPlugin.ExportSparkProject.Progress.Message=Exporting Native Spark project package...
SparkGuiPlugin.ExportSparkProject.Done.Header=Native Spark package created
SparkGuiPlugin.ExportSparkProject.Done.Message1=Package written to: {0}
SparkGuiPlugin.ExportSparkProject.Done.Message2=The path was copied to the clipboard.
SparkGuiPlugin.ExportSparkProject.Done.Message3=Submit with MainSpark --HopProjectPackage=<this zip> --HopPipelinePath=<relative.hpl> --HopRunConfigurationName=<config>. The engine distributes the zip to all executors automatically.
SparkGuiPlugin.ExportSparkProject.Error.Header=Export failed
SparkGuiPlugin.ExportSparkProject.Error.Message=Could not export the Native Spark project package
SparkGuiPlugin.FileTypes.Zip.Label=Zip files (*.zip)
SparkGuiPlugin.FileTypes.All.Label=All Files (*.*)

SparkGuiPlugin.ContextAction.Category=Spark
SparkGuiPlugin.ContextAction.SparkRunMode.Name=Spark Run Mode
SparkGuiPlugin.ContextAction.SparkRunMode.Tooltip=Override Native Spark generic transform execution: Inherit the run configuration default, force DISTRIBUTED (mapPartitions on executors), or force DRIVER_ONLY (run once on the Spark driver). Useful for Workflow Executor and other nested executions.
SparkGuiPlugin.ContextAction.SparkRunMode.Dialog.Title=Spark Run Mode
SparkGuiPlugin.ContextAction.SparkRunMode.Dialog.Message=Choose how transform "{0}" should run on the Native Spark engine when it is handled as a generic mapPartitions transform. Current: {1}
SparkGuiPlugin.ContextAction.SparkRunMode.Error.Header=Spark Run Mode
SparkGuiPlugin.ContextAction.SparkRunMode.Error.Message=Could not set the Spark run mode for this transform
