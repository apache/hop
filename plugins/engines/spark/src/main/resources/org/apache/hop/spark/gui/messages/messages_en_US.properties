SparkGuiPlugin.Menu.SparkPackageConfig.Text=Edit Native Spark package filters...
SparkGuiPlugin.Menu.ExportSparkProjectPackage.Text=Export project package for Native Spark...
SparkGuiPlugin.ExportSparkProject.Dialog.Header=Export for Native Spark execution
SparkGuiPlugin.ExportSparkProject.Dialog.Message1=This builds a project package zip specifically for running pipelines on the Native Spark engine (MainSpark --HopProjectPackage).
SparkGuiPlugin.ExportSparkProject.Dialog.Message2=It includes project definition files (pipelines, workflows, small resources under project/) plus metadata.json. Defaults skip work/, datasets/, target/, and other bulk/IDE dirs (configurable via Tools → Edit Native Spark package filters / spark-package.json). This is not the same as File → Export current project to zip or .gitignore.
SparkGuiPlugin.ExportSparkProject.Dialog.Message3=On Databricks, packages under /Volumes are shared without SparkFiles; elsewhere the zip is distributed so Simple Mapping and Pipeline Executor paths under ${PROJECT_HOME} resolve. Use separate variables (HOP_DATA / s3a://…) for Spark File data paths — not PROJECT_HOME.

SparkPackageConfigDialog.Shell.Title=Native Spark package filters
SparkPackageConfigDialog.Intro=Configure which project files are included when exporting a Native Spark project package (Tools → Export project package, Databricks Deploy & run, hop-conf). Saved as spark-package.json in the project home. Not the same as .gitignore.
SparkPackageConfigDialog.ProjectHome.Label=Project home
SparkPackageConfigDialog.Defaults.Label=Built-in exclude directories (always applied unless “Replace defaults” is checked): {0}
SparkPackageConfigDialog.ReplaceDefaults.Label=Replace built-in exclude directories (use only lists below)
SparkPackageConfigDialog.ExcludeDirs.Label=Extra exclude directories
SparkPackageConfigDialog.ExcludeDirs.Tooltip=One directory basename per line (e.g. tmp, screenshots). Merged with built-in excludes unless Replace defaults is checked.
SparkPackageConfigDialog.ExcludeGlobs.Label=Exclude globs
SparkPackageConfigDialog.ExcludeGlobs.Tooltip=One glob per line, relative to project home (e.g. **/*.jar or mappings/large/**).
SparkPackageConfigDialog.IncludePaths.Label=Force-include paths
SparkPackageConfigDialog.IncludePaths.Tooltip=One relative path per line to include even under a skipped directory (e.g. work/cluster-env.json).
SparkPackageConfigDialog.Error.Load.Title=Load failed
SparkPackageConfigDialog.Error.Load.Message=Could not read spark-package.json
SparkPackageConfigDialog.Error.Save.Title=Save failed
SparkPackageConfigDialog.Error.Save.Message=Could not write spark-package.json
SparkGuiPlugin.ExportSparkProject.NoProject.Header=No active project
SparkGuiPlugin.ExportSparkProject.NoProject.Message=PROJECT_HOME is not set. Open or enable a Hop project first, then export again.
SparkGuiPlugin.ExportSparkProject.Progress.Message=Exporting Native Spark project package...
SparkGuiPlugin.ExportSparkProject.Done.Header=Native Spark package created
SparkGuiPlugin.ExportSparkProject.Done.Message1=Package written to: {0}
SparkGuiPlugin.ExportSparkProject.Done.Message2=The path was copied to the clipboard.
SparkGuiPlugin.ExportSparkProject.Done.Message3=Submit with MainSpark --HopProjectPackage=<this zip> --HopPipelinePath=<relative.hpl> --HopRunConfigurationName=<config>. The engine distributes the zip to all executors automatically.
SparkGuiPlugin.ExportSparkProject.Error.Header=Export failed
SparkGuiPlugin.ExportSparkProject.Error.Message=Could not export the Native Spark project package
