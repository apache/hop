SparkEngine.LoadTemplate.Label=Load configuration template
SparkEngine.LoadTemplate.ToolTip=Fill master, memory, and Spark config fields from a common deployment template (local, cluster, Databricks, …)
SparkEngine.LoadTemplate.Dialog.Title=Load Spark configuration template
SparkEngine.LoadTemplate.Dialog.Message=Choose a template. Values replace the current engine options (you can edit them afterward).
SparkEngine.LoadTemplate.Confirm.Title=Replace configuration?
SparkEngine.LoadTemplate.Confirm.Message=Replace the current Native Spark options with template "{0}"?

SparkEngine.OptionsMaster.Label=Spark master
SparkEngine.OptionsMaster.ToolTip=Spark master URL, e.g. local[*], local[4], or spark://host:7077. Leave empty under spark-submit so the CLI master is used.
SparkEngine.OptionsAppName.Label=Application name
SparkEngine.OptionsAppName.ToolTip=Spark application name
SparkEngine.OptionsFatJar.Label=Fat jar file location
SparkEngine.OptionsFatJar.ToolTip=Optional path to a Hop fat jar staged on executors for cluster runs. Leave empty for pure spark-submit with a native-provided fat jar.
SparkEngine.OptionsConfigs.Label=Spark config (key=value lines)
SparkEngine.OptionsConfigs.ToolTip=Additional SparkConf entries, one key=value per line
SparkEngine.OptionsDriverMemory.Label=Driver memory
SparkEngine.OptionsDriverMemory.ToolTip=spark.driver.memory, e.g. 2g
SparkEngine.OptionsExecutorMemory.Label=Executor memory
SparkEngine.OptionsExecutorMemory.ToolTip=spark.executor.memory, e.g. 2g
SparkEngine.OptionsExecutorCores.Label=Executor cores
SparkEngine.OptionsExecutorCores.ToolTip=spark.executor.cores
SparkEngine.OptionsTempLocation.Label=Temp location
SparkEngine.OptionsTempLocation.ToolTip=Directory for temporary files
SparkEngine.OptionsPluginsToStage.Label=Plugins to stage
SparkEngine.OptionsPluginsToStage.ToolTip=Optional comma-separated plugin folders to stage on the cluster
SparkEngine.OptionsPathSchemeMap.Label=Path scheme map (from=to lines)
SparkEngine.OptionsPathSchemeMap.ToolTip=Optional URI scheme rewrite for Spark File / Lake PATH only (not classic Hop VFS). One from=to per line, e.g. s3=s3a or minio=s3a. Comments start with #. Still configure spark.hadoop.fs.s3a.* (or other FS) for the target scheme.
