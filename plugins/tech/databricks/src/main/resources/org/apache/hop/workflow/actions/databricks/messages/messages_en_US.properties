ActionDatabricksJobRun.UploadProjectPackage.Tooltip=Export and upload a Native Spark project package (same layout as Tools \u2192 Export project package for Native Spark) so nested Simple Mapping / Pipeline Executor files under PROJECT_HOME resolve on the cluster. Uses MainSpark --HopProjectPackage.
ActionDatabricksJobRun.ProjectHome.Label=Project home (export)
ActionDatabricksJobRun.ProjectHome.Tooltip=Project home directory used when exporting a package. Leave empty to use PROJECT_HOME. Ignored when Project package file is set.
ActionDatabricksJobRun.ProjectPackageFile.Label=Project package file (optional)
ActionDatabricksJobRun.ProjectPackageFile.Tooltip=Optional existing hop-spark project package zip. When blank and Upload Spark project package is checked, Hop exports from Project home / PROJECT_HOME at deploy time.
ActionDatabricksJobRun.EnvironmentConfigFile.Label=Environment config file (optional)
ActionDatabricksJobRun.EnvironmentConfigFile.Tooltip=Optional described-variables JSON uploaded as env-config.json and passed to MainSpark as --HopConfigFile (same as MainSpark 4th argument / named form).
ActionDatabricksJobRun.ClusterId.Label=Cluster / compute
ActionDatabricksJobRun.ClusterId.Tooltip=Deploy & run compute (pick one): (1) Classic existing cluster — paste the all-purpose cluster ID from the workspace. (2) Classic job cluster — enter the literal value new_cluster and set spark_version / node_type_id / num_workers below (or optional new_cluster JSON); Databricks starts a cluster for the run and terminates it afterward. (3) Serverless — enter the literal value serverless; no cluster fields are sent; uses environment_key + client below and java_dependencies for the jar.
ActionDatabricksJobRun.NewClusterSparkVersion.Label=new_cluster spark_version
ActionDatabricksJobRun.NewClusterSparkVersion.Tooltip=Databricks Runtime spark_version for a classic job cluster, e.g. 18.2.x-scala2.13. Used when Cluster / compute is new_cluster.
ActionDatabricksJobRun.NewClusterNodeType.Label=new_cluster node_type_id
ActionDatabricksJobRun.NewClusterNodeType.Tooltip=Cloud node type for a classic job cluster. On AWS prefer i3.xlarge (local NVMe; no extra EBS). m5.xlarge often requires EBS volumes. Azure example: Standard_DS3_v2. Used when Cluster / compute is new_cluster.
ActionDatabricksJobRun.NewClusterNumWorkers.Label=new_cluster num_workers
ActionDatabricksJobRun.NewClusterNumWorkers.Tooltip=Worker count for a classic job cluster. Used when Cluster / compute is new_cluster.
ActionDatabricksJobRun.NewClusterJson.Label=new_cluster JSON (optional)
ActionDatabricksJobRun.NewClusterJson.Tooltip=Optional full new_cluster JSON object. When set and Cluster / compute is new_cluster, overrides spark_version / node_type_id / num_workers.
ActionDatabricksJobRun.EnvironmentKey.Label=Serverless environment_key
ActionDatabricksJobRun.EnvironmentKey.Tooltip=Job environment key for serverless compute (default: default). Used when Cluster / compute is serverless. Task references this via environment_key; no existing_cluster_id or new_cluster is sent.
ActionDatabricksJobRun.EnvironmentClient.Label=Serverless environment client
ActionDatabricksJobRun.EnvironmentClient.Tooltip=Serverless environment spec.client version, e.g. 4 for Spark 4.x. Used when Cluster / compute is serverless.
