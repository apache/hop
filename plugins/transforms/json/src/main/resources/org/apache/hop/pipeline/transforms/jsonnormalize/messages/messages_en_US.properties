# JSON Normalize Input
JsonNormalizeInput.name=JSON normalize input
JsonNormalizeInput.description=Read JSON (files or fields), select a record array with JsonPath, flatten nested objects to dotted column paths, one row per array element. Use JSON Input when each column has its own JsonPath; use this transform to turn an array of similar records into wide rows.
JsonNormalizeInputMeta.keyword=json,normalize,flatten,ndjson,path

JsonNormalizeInputDialog.DialogTitle=JSON normalize input
JsonNormalizeInputDialog.RecordPath.Label=Record JsonPath
JsonNormalizeInputDialog.RecordPath.Tooltip=JsonPath that evaluates to the array of records to flatten (e.g. $.items[*] or $.store.book[*]).
JsonNormalizeInputDialog.FieldSeparator.Label=Field separator
JsonNormalizeInputDialog.MaxFlattenDepth.Label=Max flatten depth (-1 = unlimited)
JsonNormalizeInputDialog.ArrayHandling.Label=Array handling
JsonNormalizeInputDialog.BeyondDepth.Label=Beyond max depth
JsonNormalizeInputDialog.IgnoreMissingField.Label=Ignore missing field paths
JsonNormalizeInputDialog.IgnoreMissingField.Tooltip=If a configured field path is not present in a record, output null instead of failing.
JsonNormalizeInputDialog.GetFields.Error=Could not derive fields from the sample JSON.

JsonNormalizeInputMeta.CheckResult.NoInputField=At least one output field is required.
JsonNormalizeInputMeta.CheckResult.NoRecordPath=A record JsonPath is required (e.g. $ or $.items).

JsonNormalizeInput.ErrorInTransformRunning=Error running JSON normalize input\: {0}
JsonNormalizeInput.Error.MissingPath=Required flatten path ''{0}'' is missing in record.
