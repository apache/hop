JsonNormalizeInput.name=Normalizar a entrada JSON.
JsonNormalizeInput.description=Leia JSON (arquivos ou campos), selecione uma matriz de registros com caminho Json, objetos aninhados achatados para caminhos de colunas pontilhadas, uma linha por elemento de matriz. Use a entrada via JSON quando cada coluna tiver seu próprio caminho Json; use esta transformação para transformar uma série de registros similares em linhas largas.
JsonNormalizeInputMeta.keyword=Json, normalize, achatar, ndjson, caminho
JsonNormalizeInputDialog.DialogTitle=Normaliza a entrada JSON.
JsonNormalizeInputDialog.RecordPath.Label=Gravar caminho Json
JsonNormalizeInputDialog.RecordPath.Tooltip=caminho Json que avalia a variedade de registros para achatá-los (por exemplo, itens [*] ou $.store.book [*]).
JsonNormalizeInputDialog.FieldSeparator.Label=Separador de campo.
JsonNormalizeInputDialog.MaxFlattenDepth.Label=Máxima profundidade achatada (-1 = ilimitado)
JsonNormalizeInputDialog.ArrayHandling.Label=Manuseio de vetor
JsonNormalizeInputDialog.BeyondDepth.Label=Além da profundidade máxima
JsonNormalizeInputDialog.IgnoreMissingField.Label=Ignore os caminhos perdidos.
JsonNormalizeInputDialog.IgnoreMissingField.Tooltip=Se um caminho de campo configurado não está presente em um registro, registrar nulo em vez de falhar.
JsonNormalizeInputDialog.GetFields.Error=Não foi possível derivar campos da amostra JSON.
JsonNormalizeInputMeta.CheckResult.NoInputField=Pelo menos um campo de saída é necessário.
JsonNormalizeInputMeta.CheckResult.NoRecordPath=É necessário um registro de caminho Json (por exemplo, $ ou $.items).
JsonNormalizeInput.ErrorInTransformRunning=Erro ao executar a normalização de entrada JSON
JsonNormalizeInput.Error.MissingPath=O caminho achatado necessário está faltando.
