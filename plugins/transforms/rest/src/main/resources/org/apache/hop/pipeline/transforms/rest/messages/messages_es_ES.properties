RestDialog.Tab.Pagination.Title=Pagination
RestDialog.Tab.Pagination.Info=Paginated retrieval uses the pagination mode configured on the selected REST connection. Enable this tab and set the split path to stream JSON array rows or XPath node-sets instead of buffering whole pages. Blank max pages loops means the built-in safeguard (default 256) applies.
RestDialog.Tab.Pagination.Enable.Label=Enable pagination loop for incoming rows (REST connection paging)
RestDialog.Tab.Pagination.Enable.Tooltip=Runs multiple HTTP requests following the paging mode on metadata (NONE keeps legacy single-call behaviour). Paginated paging only applies when a REST connection defines a non-NONE pagination type.
RestDialog.Tab.Pagination.MaxPagesLoops.Label=Maximum page requests per input row (blank = default safeguard)
RestDialog.Tab.Pagination.MaxPagesLoops.Tooltip=Hard limit for loop iterations while following links, cursors, or offset steps. Leave empty for the Hop default safeguard.
RestDialog.Tab.Pagination.SplitPath.Label=Result split expression (optional JsonPath or XPath — one row per element)
RestDialog.Tab.Pagination.SplitPath.Tooltip=When set, evaluates as JsonPath for JSON types or XPath for XML types. Emits one row per extracted element.
