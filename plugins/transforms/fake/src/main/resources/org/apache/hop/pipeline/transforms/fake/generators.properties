lorem.characters.description=A string of random characters, either a fixed count or a length range, optionally including uppercase, special and digit characters.
# characters() is heavily overloaded; disambiguate by signature (count vs range, then flags).
# characters() overloads (verified against the DataFaker source): the int is either a fixed count
