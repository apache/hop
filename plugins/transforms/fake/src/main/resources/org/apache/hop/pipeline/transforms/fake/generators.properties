# ----------------------------------------------------------------------------
# Optional human-curated descriptions for the Fake transform's data generators.
#
# DataFaker exposes no descriptions or parameter names at runtime, so this file
# layers friendly text on top of the reflected catalog. It is OPTIONAL and only
# needs to cover whatever is worth describing - any generator without an entry
# falls back to its reflected function name and parameter types.
#
# Keys:
#   <category>.<function>.title                       friendly name
#   <category>.<function>.description                 one-line explanation
#   <category>.<function>.<paramCount>.param.<index>  label for one parameter
#
# <category> is the DataFaker accessor (e.g. number, internet), <function> the
# method, <paramCount> the number of arguments (disambiguates overloads) and
# <index> the zero-based parameter position.
#
# Contributions welcome: add a line, no code change required.
# ----------------------------------------------------------------------------

