AdvancedXMLOutput.name=Advanced XML output
AdvancedXMLOutput.description=Write rows to an XML file using a hierarchical XML tree with optional row-loop and group-by elements.
AdvancedXMLOutput.category=Output
AdvancedXmlOutputMeta.keyword=xml,output,write,tree,hierarchical,advanced

AdvancedXMLOutput.Injection.FILENAME=The base name of the XML file.
AdvancedXMLOutput.Injection.EXTENSION=Extension appended to the file name (without leading dot).
AdvancedXMLOutput.Injection.SPLIT_EVERY=Maximum rows per file before splitting (0 = no split).
AdvancedXMLOutput.Injection.INC_TRANSFORMNR_IN_FILENAME=Add the transform copy number to the filename.
AdvancedXMLOutput.Injection.INC_DATE_IN_FILENAME=Add the system date (yyyyMMdd) to the filename.
AdvancedXMLOutput.Injection.INC_TIME_IN_FILENAME=Add the system time (HHmmss) to the filename.
AdvancedXMLOutput.Injection.ZIPPED=Wrap the output file in a zip archive.
AdvancedXMLOutput.Injection.ADD_TO_RESULT=Add produced filename(s) to the pipeline result file list.
AdvancedXMLOutput.Injection.DO_NOT_CREATE_FILE_AT_STARTUP=Defer file creation until the first row is received.
AdvancedXMLOutput.Injection.DO_NOT_CREATE_EMPTY_FILE=Delete the file at the end of the run if no rows were written.
AdvancedXMLOutput.Injection.SPEFICY_FORMAT=Use the custom date/time pattern below instead of the date/time flags.
AdvancedXMLOutput.Injection.DATE_FORMAT=Custom date/time pattern for the filename.
AdvancedXMLOutput.Injection.ENCODING=Output character encoding (defaults to UTF-8).
AdvancedXMLOutput.Injection.COMPACT_FILE=Suppress whitespace and EOL between elements.
AdvancedXMLOutput.Injection.BLANK_LINE_AFTER_XML_DECL=Add a blank line right after the XML declaration.
AdvancedXMLOutput.Injection.CREATE_ATTR_IF_NULL=Emit attributes whose source value is null.
AdvancedXMLOutput.Injection.CREATE_ATTR_IF_UNMAPPED=Emit attributes that have no mapped field (using their default value).
AdvancedXMLOutput.Injection.CREATE_EMPTY_ELEMENT=Emit empty start/end tags for elements with no value.
AdvancedXMLOutput.Injection.TRIM_VALUES=Trim leading/trailing whitespace from emitted values.
AdvancedXMLOutput.Injection.DEFAULT_DECIMAL_SEPARATOR=Default decimal separator for numeric values (per-node still wins).
AdvancedXMLOutput.Injection.DEFAULT_GROUPING_SEPARATOR=Default grouping separator for numeric values (per-node still wins).
AdvancedXMLOutput.Injection.GENERATE_XSD=Generate a sibling .xsd file alongside the output XML.
AdvancedXMLOutput.Injection.DOCTYPE_ROOT=Root element name for the DOCTYPE declaration.
AdvancedXMLOutput.Injection.DOCTYPE_SYSTEM=System identifier for the DOCTYPE declaration.
AdvancedXMLOutput.Injection.DOCTYPE_PUBLIC=Public identifier for the DOCTYPE declaration.
AdvancedXMLOutput.Injection.XSL_HREF=URL of an XSL stylesheet to reference via xml-stylesheet PI.
AdvancedXMLOutput.Injection.XSL_TYPE=MIME type for the XSL stylesheet PI (defaults to text/xsl).

AdvancedXMLOutputMeta.CheckResult.TreeOk=The XML tree is structurally valid.
AdvancedXMLOutputMeta.CheckResult.ExpectedInputOk=Transform is connected to a previous transform receiving rows.
AdvancedXMLOutputMeta.CheckResult.ExpectedInputError=No input received from previous transforms.

AdvancedXMLOutputDialog.DialogTitle=Advanced XML output
AdvancedXMLOutputDialog.Filename.Label=Filename
AdvancedXMLOutputDialog.Extension.Label=Extension
AdvancedXMLOutputDialog.Encoding.Label=Encoding
AdvancedXMLOutputDialog.AddFileToResult.Label=Add filename to result
AdvancedXMLOutputDialog.Notice.Label=Note: the XML tree designer will be added in a follow-up release. For now, configure the tree by editing the transform metadata directly.
