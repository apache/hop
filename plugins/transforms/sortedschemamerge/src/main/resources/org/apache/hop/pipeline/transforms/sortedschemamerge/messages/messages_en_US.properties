SortedSchemaMerge.Name = Sorted Schema Merge
SortedSchemaMerge.Description = Merge pre-sorted input streams with different schemas into one sorted sparse stream
SortedSchemaMerge.keyword = sorted schema merge stream union sparse

SortedSchemaMerge.Log.LineNumber = Line number {0}
SortedSchemaMerge.Error.TooFewInputs = At least two sorted input streams are required
SortedSchemaMerge.Error.NoSortKeys = At least one sort key is required
SortedSchemaMerge.Error.NoInputRowSets = No input row sets were found

SortedSchemaMergeDialog.Title = Sorted Schema Merge
SortedSchemaMergeDialog.TransformName.Label = Transform name
SortedSchemaMergeDialog.Inputs.Label = Input transforms
SortedSchemaMergeDialog.Inputs.Column.Transform = Transform
SortedSchemaMergeDialog.SortKeys.Label = Sort keys
SortedSchemaMergeDialog.SortKeys.Column.Field = Field
SortedSchemaMergeDialog.SortKeys.Column.Ascending = Ascending
SortedSchemaMergeDialog.SortedInputNote.Label = Each input stream must already be sorted on the sort keys (for example via ORDER BY in Table Input).

SortedSchemaMergeMeta.CheckResult.TooFewInputs = Configure at least two input transforms
SortedSchemaMergeMeta.CheckResult.InputCountOk = At least two input transforms are configured
SortedSchemaMergeMeta.CheckResult.NoSortKeys = No sort keys are defined
SortedSchemaMergeMeta.CheckResult.SortKeysMissing = The following sort keys were not found in the input streams:{0}
SortedSchemaMergeMeta.CheckResult.SortKeysOk = All sort keys were found in the input streams
SortedSchemaMergeMeta.CheckResult.ReceivingRowsOk = Receiving rows from upstream transforms
SortedSchemaMergeMeta.CheckResult.ReceivingRowsError = Not receiving rows from upstream transforms. Connect at least two sorted input hops.
