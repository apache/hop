# The gcp project runs pipelines on Google Dataflow, which needs the Hop fat jar. It therefore uses
# hop-beam-image (via integration-tests-beam-base.yaml) instead of the plain base image. Without
# this file the runner would fall back to the fat-jar-less base image. The gcp project is currently
# disabled (integration-tests/gcp/disabled.txt) as it requires live Google Cloud credentials.
services:
  integration_test_gcp:
    extends:
      file: integration-tests-beam-base.yaml
      service: integration_test
