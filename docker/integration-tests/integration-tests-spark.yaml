# Beam Spark smoke tests: Hop (Java 21) + standalone Spark master/worker.
# SPARK_VERSION is overridable for the multi-version matrix (see run-spark-matrix.sh).
# Hive/HDFS services are intentionally omitted from the default smoke path; re-add via a
# separate compose file when the Hive catalog tests are revived.

services:
  # Service name must be a valid Spark RPC hostname (no underscores).
  hop-spark-test:
    extends:
      file: integration-tests-beam-base.yaml
      service: integration_test
    depends_on:
      spark:
        condition: service_healthy
      spark-worker:
        condition: service_started
    links:
      - spark
      - spark-worker
    # Hop is always Java 21. Spark workers also run Java 21 so they can execute Hop
    # bytecode from the fat jar. Advertise this container as the Spark driver so
    # workers on the compose network can open reverse connections.
    environment:
      - FLASK_ENV=docker
      - SPARK_LOCAL_IP=0.0.0.0
      # Match driver Spark client pack to cluster (and to fat jar); empty = default pack
      - HOP_SPARK_CLIENT_VERSION=${HOP_SPARK_CLIENT_VERSION:-}
      # spark.ui.enabled=false: Hop ships jakarta servlet APIs that clash with Spark's
      # javax-based UI stack (jersey ServletContainer). UI is not needed for IT smoke.
      - HOP_OPTIONS=-Dspark.ui.enabled=false -Dspark.driver.host=hop-spark-test -Dspark.driver.bindAddress=0.0.0.0
  spark:
    build:
      context: ../../docker/integration-tests/spark/.
      dockerfile: Dockerfile.master
      args:
        SPARK_VERSION: ${SPARK_VERSION:-3.5.8}
        HADOOP_VERSION: ${HADOOP_VERSION:-3}
        # Fast CDN by default (current patch); the Dockerfile falls back to archive.apache.org
        # for historical matrix versions that the CDN no longer carries.
        BASE_URL: ${SPARK_BASE_URL:-https://dlcdn.apache.org/spark}
    environment:
      - INIT_DAEMON_STEP=setup_spark
      # Advertise a stable compose-network hostname (not the random container id)
      - SPARK_MASTER_HOST=spark
    ports:
      - 8080
      - 7077
  spark-worker:
    build:
      context: ../../docker/integration-tests/spark/.
      dockerfile: Dockerfile.worker
      args:
        SPARK_VERSION: ${SPARK_VERSION:-3.5.8}
        HADOOP_VERSION: ${HADOOP_VERSION:-3}
        BASE_URL: ${SPARK_BASE_URL:-https://dlcdn.apache.org/spark}
    depends_on:
      spark:
        condition: service_healthy
    environment:
      - "SPARK_MASTER=spark://spark:7077"
    ports:
      - 8081
