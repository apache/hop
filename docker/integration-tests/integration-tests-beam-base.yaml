# Same as integration-tests-base.yaml, but backed by hop-beam-image, which adds the Hop fat jar
# at /tmp/hop-fatjar.jar. Only the Beam-based projects (spark, flink, gcp) extend this service.
# hop-beam-image is FROM hop-base-image, so the base image must be built first (run-tests-docker.sh
# builds the base image up-front and this beam image on demand when a Beam project runs).
services:
  integration_test:
    image: hop-beam-image
    build:
      context: ../../.
      dockerfile: docker/integration-tests/unit-tests-beam.Dockerfile
      args:
        HOP_SPARK_CLIENT_VERSION: ${HOP_SPARK_CLIENT_VERSION:-}
    volumes:
      - ../../integration-tests/:/files
    environment:
      - FLASK_ENV=docker
      # Keep driver Spark client pack in sync with the fat jar (empty = default pack)
      - HOP_SPARK_CLIENT_VERSION=${HOP_SPARK_CLIENT_VERSION:-}
      # Optional workflow basename filter (substring or glob). Set by run-tests-docker.sh.
      - TEST_FILTER=${TEST_FILTER:-}
      - SKIP_GOOGLE_SHEETS=${SKIP_GOOGLE_SHEETS:-false}
    command: [ "bash", "-c", "/files/scripts/run-tests.sh ${PROJECT_NAME}" ]
