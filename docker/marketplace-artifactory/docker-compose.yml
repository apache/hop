#
# Local Artifactory OSS for Hop marketplace plugin testing (no ASF Nexus credentials required).
#
# Prerequisites:
#   ./docker/marketplace-artifactory/generate-keys.sh
#   # creates keys/master.key and keys/join.key (openssl rand -hex 32),
#   # mode 600, owner 1030:1030
#
# Usage:
#   docker compose -f docker/marketplace-artifactory/docker-compose.yml up -d
#   # open http://localhost:8082  (set admin password on first UI login)
#   ./docker/marketplace-artifactory/publish-wave1-plugins.sh
#
services:
  artifactory:
    image: releases-docker.jfrog.io/jfrog/artifactory-oss:7.104.14
    container_name: hop-marketplace-artifactory
    # Official image runs as artifactory (UID/GID 1030)
    user: "1030:1030"
    ports:
      - "8082:8082"
      - "8081:8081"
    volumes:
      - hop-artifactory-data:/var/opt/jfrog/artifactory
      # Both keys are required at startup; without them microservices hang
      # ("Cluster join: Join key is missing" / master key pending).
      # Host files prepared by generate-keys.sh (600 / 1030:1030).
      - ./keys/master.key:/var/opt/jfrog/artifactory/etc/security/master.key:ro
      - ./keys/join.key:/var/opt/jfrog/artifactory/etc/security/join.key:ro
    environment:
      # Reduce memory for local dev
      EXTRA_JAVA_OPTIONS: -Xms512m -Xmx1g
      # Artifactory 7.x shared security key locations
      JF_SHARED_SECURITY_MASTER_KEY_FILE: /var/opt/jfrog/artifactory/etc/security/master.key
      JF_SHARED_SECURITY_JOIN_KEY_FILE: /var/opt/jfrog/artifactory/etc/security/join.key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/artifactory/api/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  hop-artifactory-data:
