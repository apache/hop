# Local Artifactory OSS + PostgreSQL for Hop marketplace testing.
#
# Recent Artifactory 7.x builds require PostgreSQL (embedded Derby is gone).
#
# Prerequisites:
#   ./docker/marketplace-artifactory/generate-keys.sh
# Start:
#   ./docker/marketplace-artifactory/start.sh
#
# UI: http://localhost:8082
#
services:
  postgres:
    image: postgres:15-alpine
    container_name: hop-marketplace-postgres
    environment:
      POSTGRES_DB: artifactory
      POSTGRES_USER: artifactory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hop_artifactory_dev}
    volumes:
      - hop-artifactory-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artifactory -d artifactory"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    # Not published to host by default (Artifactory reaches it on the compose network)

  artifactory:
    image: releases-docker.jfrog.io/jfrog/artifactory-oss:7.104.14
    container_name: hop-marketplace-artifactory
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"
      - "8081:8081"
    volumes:
      - hop-artifactory-data:/var/opt/jfrog/artifactory
    environment:
      # Security keys as values (not bind-mounted files — Artifactory rewrites them)
      JF_SHARED_SECURITY_MASTER_KEY: ${JF_SHARED_SECURITY_MASTER_KEY:?Run generate-keys.sh first}
      JF_SHARED_SECURITY_JOIN_KEY: ${JF_SHARED_SECURITY_JOIN_KEY:?Run generate-keys.sh first}
      # PostgreSQL (required by modern Artifactory OSS)
      JF_SHARED_DATABASE_TYPE: postgresql
      JF_SHARED_DATABASE_URL: jdbc:postgresql://postgres:5432/artifactory
      JF_SHARED_DATABASE_USERNAME: artifactory
      JF_SHARED_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-hop_artifactory_dev}
      JF_SHARED_DATABASE_DRIVER: org.postgresql.Driver
      # Heap: 1g is tight; raise if the host has RAM to spare
      JF_SHARED_EXTRAJAVAOPTS: -Xms512m -Xmx2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/artifactory/api/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 240s

volumes:
  hop-artifactory-data:
  hop-artifactory-postgres:
